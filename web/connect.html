<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tor-js-gateway &mdash; connect</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%231a1a2e' stroke='%237b68ee' stroke-width='2'/><path d='M16 6a10 10 0 0 1 0 20 10 10 0 0 1 0-20m0 3a7 7 0 0 1 0 14 7 7 0 0 1 0-14m0 3a4 4 0 0 1 0 8 4 4 0 0 1 0-8' fill='none' stroke='%237b68ee' stroke-width='1.5'/><circle cx='16' cy='16' r='1.5' fill='%237b68ee'/></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --accent: #7b68ee;
  --accent-hover: #9d8ffa;
  --text: #e0e0e0;
  --text-dim: #a0a0a0;
  --text-muted: #6a6a8a;
  --border: #2a2a4a;
  --success: #4caf50;
  --error: #e57373;
  --warn: #ffb74d;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

header {
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem;
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

h1 {
  font-size: 1.5rem;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: -0.02em;
}

.subtitle {
  color: var(--text-dim);
  font-size: 0.875rem;
  margin-top: 0.15rem;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  font-size: 0.875rem;
}
.nav-links a { color: var(--text-dim); }
.nav-links a:hover { color: var(--text); }

main {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem;
}

/* Form area */
.connect-form {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.connect-form h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 1rem;
}

.form-row {
  display: flex;
  gap: 0.75rem;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 0.75rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.form-group label {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-group input, .form-group select {
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  outline: none;
}

.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
}

.form-group input::placeholder { color: var(--text-muted); }

#target-input { width: 280px; }

.btn {
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 600;
  padding: 0.5rem 1.5rem;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  border: none;
}
.btn:hover:not(:disabled) { transform: translateY(-1px); }
.btn:active:not(:disabled) { transform: translateY(0); }
.btn:disabled { cursor: default; opacity: 0.5; }

.btn-connect {
  background: var(--accent);
  color: #fff;
}
.btn-connect:hover:not(:disabled) { background: var(--accent-hover); }

.btn-send {
  background: #2a4a2a;
  color: #81c784;
  border: 1px solid #3a5a3a;
}
.btn-send:hover:not(:disabled) { background: #2a5a2a; }

.btn-close {
  background: #3a1a1a;
  color: var(--error);
  border: 1px solid #5a2a2a;
}
.btn-close:hover:not(:disabled) { background: #4a1a1a; }

.btn-clear {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  font-size: 0.75rem;
  padding: 0.35rem 0.75rem;
}
.btn-clear:hover:not(:disabled) { color: var(--text-dim); border-color: var(--text-muted); }

.hint {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}

/* Relay picker */
#relay-list {
  display: none;
  margin-top: 0.5rem;
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
}

#relay-list.visible { display: block; }

.relay-option {
  padding: 0.35rem 0.75rem;
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  gap: 0.75rem;
  align-items: center;
}

.relay-option:hover { background: rgba(123, 104, 238, 0.08); }
.relay-option .relay-name { color: var(--text); font-weight: 600; min-width: 100px; }
.relay-option .relay-addr { color: var(--text-dim); }
.relay-option .relay-bw { color: var(--text-muted); margin-left: auto; font-size: 0.7rem; }

/* Connection panel */
.connection-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.conn-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.conn-header h3 {
  font-family: var(--mono);
  font-size: 0.9rem;
  font-weight: 600;
  flex: 1;
}

.conn-badge {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-weight: 600;
}

.conn-badge.websocket { background: #1a2a3a; color: #64b5f6; }
.conn-badge.webrtc { background: #2a1a3a; color: #ce93d8; }
.conn-badge.direct { background: #1a3a2a; color: #81c784; }
.conn-badge.auto { background: #2a2a3a; color: var(--text-dim); }

.status-indicator {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--mono);
  font-size: 0.78rem;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.status-dot.connecting { background: var(--warn); animation: blink 1s ease-in-out infinite; }
.status-dot.open { background: var(--success); box-shadow: 0 0 6px rgba(76, 175, 80, 0.5); }
.status-dot.closed { background: var(--error); }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Send area */
.send-area {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  align-items: flex-end;
}

.send-area .form-group { flex: 1; }

.send-area input {
  width: 100%;
  font-family: var(--mono);
  font-size: 0.82rem;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  outline: none;
}

.send-area input:focus { border-color: var(--accent); }
.send-area input::placeholder { color: var(--text-muted); }

/* Log */
.event-log {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  max-height: 400px;
  overflow-y: auto;
  font-family: var(--mono);
  font-size: 0.78rem;
  line-height: 1.5;
}

.log-entry {
  padding: 0.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 0.75rem;
}

.log-entry:last-child { border-bottom: none; }

.log-ts {
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.log-dir {
  font-weight: 700;
  flex-shrink: 0;
  width: 1.5em;
  text-align: center;
}

.log-dir.out { color: #81c784; }
.log-dir.in { color: #64b5f6; }
.log-dir.sys { color: var(--warn); }
.log-dir.err { color: var(--error); }

.log-body {
  color: var(--text-dim);
  word-break: break-all;
}

/* Hex dump */
.hex-line {
  display: flex;
  gap: 0.5rem;
}

.hex-offset { color: var(--text-muted); }
.hex-bytes { color: var(--text-dim); }
.hex-ascii { color: var(--text-muted); }

.log-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}

.log-controls label {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 0.4rem;
  cursor: pointer;
}

.log-stats {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-muted);
}

/* Shared signal channel panel */
.signal-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 1rem;
  overflow: hidden;
}

.signal-panel summary {
  cursor: pointer;
  padding: 0.75rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  list-style: none;
  font-size: 0.85rem;
}

.signal-panel summary::-webkit-details-marker { display: none; }

.signal-panel summary::before {
  content: '\25B6';
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-right: 0.5rem;
  transition: transform 0.15s;
}

.signal-panel[open] summary::before { transform: rotate(90deg); }

.signal-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

.signal-log {
  max-height: 200px;
  border-top: 1px solid var(--border);
}

@media (max-width: 640px) {
  .form-row { flex-direction: column; }
  #target-input { width: 100%; }
  main { padding: 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <a href="/" style="color:inherit;text-decoration:none;"><h1>tor-js-gateway</h1></a>
      <p class="subtitle">Relay connection tester &mdash; WebSocket &amp; WebRTC</p>
    </div>
    <div class="nav-links">
      <a href="/connect">Connect</a>
      <a href="/bootstrap">Bootstrap</a>
      <a href="https://github.com/privacy-ethereum/tor-fast-bootstrap" class="github-link" title="View on GitHub">
        <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </div>
  </div>
</header>

<main>
  <div class="connect-form">
    <h2>Connect to a Tor relay</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="target-input">Target (ip:port)</label>
        <input id="target-input" type="text" placeholder="128.31.0.39:9201" autocomplete="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label for="transport-select">Transport</label>
        <select id="transport-select">
          <option value="auto">Auto</option>
          <option value="webrtc">WebRTC</option>
          <option value="websocket">WebSocket</option>
        </select>
      </div>
      <button id="connect-btn" class="btn btn-connect">Connect</button>
    </div>
    <div class="hint">
      Only consensus-listed relay addresses are allowed.
      <a href="#" id="random-relay-link">Random relay</a> &middot;
      <a href="#" id="pick-relay-link">Browse relays</a>
    </div>
    <div id="relay-list"></div>
  </div>

  <details class="signal-panel" id="signal-panel" hidden>
    <summary>
      <span class="signal-label">Signal Channel</span>
      <button class="btn btn-clear" id="ping-btn" onclick="event.preventDefault()">Ping</button>
    </summary>
    <div class="event-log signal-log" id="signal-log"></div>
  </details>

  <div id="connections"></div>
</main>

<script type="module">
import { Gateway } from './torJsGateway.js';

const connectionsEl = document.getElementById('connections');
const targetInput = document.getElementById('target-input');
const transportSelect = document.getElementById('transport-select');
const connectBtn = document.getElementById('connect-btn');
const pickRelayLink = document.getElementById('pick-relay-link');
const relayListEl = document.getElementById('relay-list');

let connId = 0;

// Shared gateway instances (one per strategy config to reuse WebRTC peer connections)
const gateways = new Map();
let relays = null; // cached relay list from metadata

// --- Relay picker ---

async function loadRelays() {
  if (relays) return relays;
  try {
    const res = await fetch('./metadata.json');
    if (!res.ok) return null;
    const meta = await res.json();
    // We don't have full relay list from metadata, but we can try bootstrap
    // For now just return null — the picker will show a message
    return null;
  } catch {
    return null;
  }
}

pickRelayLink.addEventListener('click', async (e) => {
  e.preventDefault();
  if (relayListEl.classList.contains('visible')) {
    relayListEl.classList.remove('visible');
    return;
  }

  relayListEl.innerHTML = '<div class="relay-option" style="color:var(--text-muted);cursor:default;">Loading relays from bootstrap data...</div>';
  relayListEl.classList.add('visible');

  try {
    // Fetch and parse bootstrap to get relay addresses
    const { parseBootstrapZip, smartBootstrapDownload } = await import('./torJsGateway.js');
    const zip = await smartBootstrapDownload('./bootstrap.zip.br');
    const { consensus } = parseBootstrapZip(zip);

    const relayItems = [];
    const lines = consensus.split('\n');
    for (let i = 0; i < lines.length; i++) {
      if (!lines[i].startsWith('r ')) continue;
      const parts = lines[i].split(' ');
      const nickname = parts[1] || '?';
      const ip = parts[5] || '?';
      const port = parts[6] || '0';
      // Look ahead for bandwidth
      let bw = 0;
      for (let j = i + 1; j < lines.length && !lines[j].startsWith('r ') && lines[j] !== 'directory-footer'; j++) {
        if (lines[j].startsWith('w ')) {
          const m = lines[j].match(/Bandwidth=(\d+)/);
          if (m) bw = parseInt(m[1], 10);
        }
      }
      relayItems.push({ nickname, addr: `${ip}:${port}`, bw });
    }

    // Sort by bandwidth descending, show top 50
    relayItems.sort((a, b) => b.bw - a.bw);
    relayListEl.innerHTML = '';

    const shown = relayItems.slice(0, 50);
    for (const r of shown) {
      const div = document.createElement('div');
      div.className = 'relay-option';
      div.innerHTML =
        `<span class="relay-name">${esc(r.nickname)}</span>` +
        `<span class="relay-addr">${esc(r.addr)}</span>` +
        `<span class="relay-bw">${r.bw >= 1000 ? (r.bw / 1000).toFixed(0) + 'k' : r.bw}</span>`;
      div.addEventListener('click', () => {
        targetInput.value = r.addr;
        relayListEl.classList.remove('visible');
      });
      relayListEl.appendChild(div);
    }
  } catch (err) {
    relayListEl.innerHTML = `<div class="relay-option" style="color:var(--error);cursor:default;">Failed to load relays: ${esc(String(err))}</div>`;
  }
});

// --- Hex dump ---

function hexDump(bytes, maxBytes) {
  const limited = maxBytes && bytes.length > maxBytes;
  const data = limited ? bytes.slice(0, maxBytes) : bytes;
  const lines = [];
  for (let i = 0; i < data.length; i += 16) {
    const chunk = data.slice(i, i + 16);
    const offset = i.toString(16).padStart(4, '0');
    const hex = Array.from(chunk, b => b.toString(16).padStart(2, '0')).join(' ');
    const ascii = Array.from(chunk, b => b >= 0x20 && b < 0x7f ? String.fromCharCode(b) : '.').join('');
    lines.push(`<span class="hex-line"><span class="hex-offset">${offset}</span> <span class="hex-bytes">${hex.padEnd(48)}</span> <span class="hex-ascii">${esc(ascii)}</span></span>`);
  }
  if (limited) {
    lines.push(`<span style="color:var(--text-muted);">... (${bytes.length - maxBytes} more bytes)</span>`);
  }
  return lines.join('\n');
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// --- Connection panel ---

function createConnectionPanel(target, transport) {
  const id = ++connId;
  const panel = document.createElement('div');
  panel.className = 'connection-panel';
  panel.innerHTML = `
    <div class="conn-header">
      <span class="conn-badge ${transport}" id="badge-${id}">${transport.toUpperCase()}</span>
      <h3>${esc(target)}</h3>
      <div class="status-indicator">
        <span class="status-dot connecting" id="dot-${id}"></span>
        <span id="status-${id}">Connecting...</span>
      </div>
      <button class="btn btn-close" id="close-${id}">Close</button>
    </div>
    <div class="send-area">
      <div class="form-group">
        <input id="send-${id}" type="text" placeholder="Hex bytes to send (e.g. 00 07 00 03 ...)" spellcheck="false">
      </div>
      <button class="btn btn-send" id="tlsbtn-${id}" title="Send a minimal TLS ClientHello — expect a TLS Alert response">TLS Probe</button>
      <button class="btn btn-send" id="sendbtn-${id}">Send</button>
    </div>
    <div class="log-controls">
      <label><input type="checkbox" id="autoscroll-${id}" checked> Auto-scroll</label>
      <div>
        <span class="log-stats" id="stats-${id}">0 sent, 0 received</span>
        <button class="btn btn-clear" id="clear-${id}">Clear</button>
      </div>
    </div>
    <div class="event-log" id="log-${id}"></div>
  `;
  connectionsEl.prepend(panel);

  const logEl = panel.querySelector(`#log-${id}`);
  const dotEl = panel.querySelector(`#dot-${id}`);
  const statusEl = panel.querySelector(`#status-${id}`);
  const sendInput = panel.querySelector(`#send-${id}`);
  const sendBtn = panel.querySelector(`#sendbtn-${id}`);
  const tlsBtn = panel.querySelector(`#tlsbtn-${id}`);
  const badgeEl = panel.querySelector(`#badge-${id}`);
  const closeBtn = panel.querySelector(`#close-${id}`);
  const autoScrollCheck = panel.querySelector(`#autoscroll-${id}`);
  const clearBtn = panel.querySelector(`#clear-${id}`);
  const statsEl = panel.querySelector(`#stats-${id}`);

  let bytesSent = 0;
  let bytesRecv = 0;
  let t0 = performance.now();

  function ts() {
    return ((performance.now() - t0) / 1000).toFixed(3) + 's';
  }

  function updateStats() {
    statsEl.textContent = `${fmtBytes(bytesSent)} sent, ${fmtBytes(bytesRecv)} received`;
  }

  function fmtBytes(n) {
    if (n >= 1048576) return (n / 1048576).toFixed(1) + ' MB';
    if (n >= 1024) return (n / 1024).toFixed(1) + ' KB';
    return n + ' B';
  }

  function addLog(dir, body, isHex) {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const dirClass = dir === '>' ? 'out' : dir === '<' ? 'in' : dir === '!' ? 'err' : 'sys';
    entry.innerHTML =
      `<span class="log-ts">${ts()}</span>` +
      `<span class="log-dir ${dirClass}">${esc(dir)}</span>` +
      `<span class="log-body">${isHex ? body : esc(body)}</span>`;
    logEl.appendChild(entry);
    if (autoScrollCheck.checked) {
      logEl.scrollTop = logEl.scrollHeight;
    }
  }

  clearBtn.addEventListener('click', () => {
    logEl.innerHTML = '';
  });

  function setStatus(state, text) {
    dotEl.className = `status-dot ${state}`;
    statusEl.textContent = text;
  }

  function parseSendInput(raw) {
    const hex = raw.replace(/[^0-9a-fA-F]/g, '');
    if (hex.length === 0 || hex.length % 2 !== 0) return null;
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < bytes.length; i++) {
      bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
    }
    return bytes;
  }

  // Return control interface
  return {
    addLog,
    setStatus,
    sendInput,
    sendBtn,
    tlsBtn,
    closeBtn,
    parseSendInput,
    setBadge(strategy) {
      badgeEl.className = `conn-badge ${strategy}`;
      badgeEl.textContent = strategy.toUpperCase();
    },
    onSent(n) { bytesSent += n; updateStats(); },
    onRecv(n) { bytesRecv += n; updateStats(); },
  };
}

// --- Unified connect ---

// --- Shared signal channel UI ---

const signalPanel = document.getElementById('signal-panel');
const signalLogEl = document.getElementById('signal-log');
const pingBtnEl = document.getElementById('ping-btn');
let signalT0 = performance.now();

function signalTs() {
  return ((performance.now() - signalT0) / 1000).toFixed(3) + 's';
}

function addSignalLog(dir, body) {
  signalPanel.hidden = false;
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const dirClass = dir === '>' ? 'out' : dir === '<' ? 'in' : dir === '!' ? 'err' : 'sys';
  entry.innerHTML =
    `<span class="log-ts">${signalTs()}</span>` +
    `<span class="log-dir ${dirClass}">${esc(dir)}</span>` +
    `<span class="log-body">${esc(body)}</span>`;
  signalLogEl.appendChild(entry);
  signalLogEl.scrollTop = signalLogEl.scrollHeight;
}

// One gateway per strategy config, with event logging dispatched to active panel.
let activeCtrl = null;
let activeGw = null;

pingBtnEl.addEventListener('click', () => {
  if (activeGw) {
    activeGw.ping();
    addSignalLog('>', 'ping');
  }
});

function getGateway(strategies) {
  const key = strategies ? strategies.join(',') : 'auto';
  let gw = gateways.get(key);
  if (gw) return gw;
  const opts = {
    onEvent: (ev) => {
      // Signal channel events go to the shared signal log.
      if (ev.type.startsWith('rtc-')) {
        switch (ev.type) {
          case 'rtc-hello':
            addSignalLog('<', `hello (server=${ev.server}, ipv6=${ev.ipv6})`);
            return;
          case 'rtc-pong': {
            const rtt = ev.ts ? `${Date.now() - ev.ts}ms` : '?';
            addSignalLog('<', `pong (rtt=${rtt})`);
            return;
          }
          case 'rtc-rejected':
            addSignalLog('<', `rejected ${ev.channel}: ${ev.reason}`);
            return;
          case 'rtc-error':
            addSignalLog('!', ev.message);
            return;
          case 'rtc-signaling':
            addSignalLog('*', 'signaling');
            break; // also log to connection panel
          case 'rtc-connected':
            addSignalLog('*', 'peer connected');
            break;
          case 'rtc-disconnected':
            addSignalLog('*', 'peer disconnected');
            break;
        }
      }
      const msg = ev.strategy
        ? `${ev.type} [${ev.strategy}]`
        : ev.type;
      activeCtrl?.addLog('*', msg);
    },
  };
  if (strategies) opts.strategies = strategies;
  gw = new Gateway(location.origin, opts);
  gateways.set(key, gw);
  return gw;
}

async function doConnect(target, strategyChoice) {
  const strategies = strategyChoice === 'auto' ? undefined : [strategyChoice];
  const label = strategyChoice === 'auto' ? 'auto' : strategyChoice;
  const ctrl = createConnectionPanel(target, label);
  activeCtrl = ctrl;

  try {
    const gw = getGateway(strategies);

    ctrl.addLog('*', `Connecting to ${target}...`);
    const sock = await gw.connect(target);

    if (sock.strategy) ctrl.setBadge(sock.strategy);
    ctrl.setStatus('open', 'Connected');
    ctrl.addLog('*', `Connected via ${sock.strategy || 'unknown'}`);
    activeGw = gw;

    sock.onmessage = (data) => {
      ctrl.onRecv(data.length);
      ctrl.addLog('<', hexDump(data, 256), true);
    };

    sock.onclose = () => {
      const reason = sock._error ? `Rejected: ${sock._error}` : 'Closed';
      ctrl.setStatus('closed', reason);
      ctrl.addLog(sock._error ? '!' : '*', reason);
      ctrl.sendBtn.disabled = true;
      ctrl.tlsBtn.disabled = true;
    };

    function sendBytes(bytes) {
      try {
        sock.send(bytes);
        ctrl.onSent(bytes.length);
        ctrl.addLog('>', hexDump(bytes, 256), true);
      } catch (e) {
        ctrl.addLog('!', `Send error: ${e.message}`);
      }
    }

    ctrl.sendBtn.addEventListener('click', () => {
      const bytes = ctrl.parseSendInput(ctrl.sendInput.value);
      if (!bytes) {
        ctrl.addLog('!', 'Invalid hex input');
        return;
      }
      sendBytes(bytes);
      ctrl.sendInput.value = '';
    });

    // TLS ClientHello probe
    ctrl.tlsBtn.addEventListener('click', () => {
      sendBytes(new Uint8Array([0x16, 0x03, 0x01, 0x00, 0x05, 0x01, 0x00, 0x00, 0x01, 0x00]));
    });

    ctrl.sendInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') ctrl.sendBtn.click();
    });

    ctrl.closeBtn.addEventListener('click', () => {
      sock.close();
    });

  } catch (err) {
    ctrl.setStatus('closed', 'Failed');
    ctrl.addLog('!', `Connection failed: ${err.message}`);
    ctrl.sendBtn.disabled = true;
  }
}

// --- Main connect handler ---

connectBtn.addEventListener('click', () => {
  const target = targetInput.value.trim();
  if (!target) return;
  doConnect(target, transportSelect.value);
});

targetInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') connectBtn.click();
});

// Random relay
const randomRelayLink = document.getElementById('random-relay-link');
async function fetchRandomRelay() {
  try {
    const res = await fetch('./relay/random');
    if (res.ok) targetInput.value = await res.text();
  } catch {}
}
randomRelayLink.addEventListener('click', (e) => {
  e.preventDefault();
  fetchRandomRelay();
});

// Pre-populate from URL hash, or fetch a random relay
if (location.hash) {
  const params = new URLSearchParams(location.hash.slice(1));
  if (params.get('target')) targetInput.value = params.get('target');
  if (params.get('strategy')) transportSelect.value = params.get('strategy');
} else {
  fetchRandomRelay();
}
</script>
