<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tor-js-gateway</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%231a1a2e' stroke='%237b68ee' stroke-width='2'/><path d='M16 6a10 10 0 0 1 0 20 10 10 0 0 1 0-20m0 3a7 7 0 0 1 0 14 7 7 0 0 1 0-14m0 3a4 4 0 0 1 0 8 4 4 0 0 1 0-8' fill='none' stroke='%237b68ee' stroke-width='1.5'/><circle cx='16' cy='16' r='1.5' fill='%237b68ee'/></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --accent: #7b68ee;
  --accent-hover: #9d8ffa;
  --text: #e0e0e0;
  --text-dim: #a0a0a0;
  --text-muted: #6a6a8a;
  --border: #2a2a4a;
  --success: #4caf50;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

header {
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem;
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

h1 {
  font-size: 1.5rem;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: -0.02em;
}

.subtitle {
  color: var(--text-dim);
  font-size: 0.875rem;
  margin-top: 0.15rem;
}

.github-link {
  color: var(--text-dim);
  transition: color 0.15s;
  flex-shrink: 0;
}
.github-link:hover { color: var(--text); }

main {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem;
}

/* Bootstrap button */
.action { text-align: center; margin: 2rem 0; display: flex; justify-content: center; gap: 0.75rem; }

.action button {
  font-family: var(--sans);
  font-size: 1rem;
  font-weight: 600;
  padding: 0.75rem 2.5rem;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.action button:hover:not(:disabled) { transform: translateY(-1px); }
.action button:active:not(:disabled) { transform: translateY(0); }
.action button:disabled { cursor: default; }

#bootstrap-btn {
  border: none;
  background: var(--accent);
  color: #fff;
}
#bootstrap-btn:hover:not(:disabled) { background: var(--accent-hover); }
#bootstrap-btn:disabled { background: var(--border); color: var(--text-muted); }

#download-zip-btn {
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
}
#download-zip-btn:hover:not(:disabled) { background: rgba(123, 104, 238, 0.1); }
#download-zip-btn:disabled { border-color: var(--border); color: var(--text-muted); }

/* Log table */
#log-section { margin-top: 1.5rem; }
#log-section h2 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
}

#log {
  font-family: var(--mono);
  font-size: 0.85rem;
  display: grid;
  grid-template-columns: auto auto auto 1fr;
  gap: 0.25rem 0.75rem;
  align-items: baseline;
}

#log .log-header {
  color: var(--text-muted);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding-bottom: 0.25rem;
  border-bottom: 1px solid var(--border);
}

.log-step { color: var(--text-muted); text-align: right; }
.log-total { color: var(--text-muted); text-align: right; }

.log-icon {
  width: 1.2em;
  text-align: center;
}
.log-icon.spin { color: var(--accent); animation: spin 1s linear infinite; display: inline-block; }
.log-icon.done { color: var(--success); animation: none; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

.log-msg { color: var(--text-dim); }
.log-row-done .log-msg { color: var(--text); }

/* Error banner */
.error-banner {
  background: #2a1a1a;
  border: 1px solid #e5737388;
  border-radius: 4px;
  padding: 0.75rem 1rem;
  margin-top: 1rem;
  color: #e57373;
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

.error-banner strong {
  color: #ef9a9a;
  display: block;
  margin-bottom: 0.25rem;
  font-size: 0.85rem;
}

/* Progress bar */
.progress-bar {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 0.5rem;
  width: 100%;
}
.progress-prefix {
  font-size: 0.75rem;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 14ch;
}
.progress-track {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  width: 0%;
  transition: width 0.15s ease;
}
.progress-label {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text-muted);
  white-space: pre;
  text-align: right;
}

/* Results */
#results-section { margin-top: 2.5rem; }
#results-section > h2 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 1rem;
}

.result-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}

.result-block h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  color: var(--accent);
}

.result-block dl {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.3rem 1rem;
  font-size: 0.85rem;
}

.result-block dt { color: var(--text-dim); }
.result-block dd { font-family: var(--mono); font-size: 0.8rem; }

.flag-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.5rem;
}

.flag-badge {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  background: var(--border);
  color: var(--text-dim);
}
.flag-badge.exit { background: #3a1a1a; color: #e57373; }
.flag-badge.guard { background: #1a2a1a; color: #81c784; }
.flag-badge.hsdir { background: #1a1a3a; color: #7986cb; }

/* Freshness timeline bar */
.freshness-bar-wrap {
  position: relative;
  margin-top: 0.75rem;
  margin-bottom: 18px;
}

.freshness-bar {
  display: flex;
  align-items: stretch;
  border-radius: 4px;
  overflow: hidden;
  font-family: var(--mono);
  font-size: 0.8rem;
  border: 1px solid #ffffff88;
}

.freshness-bar .segment {
  box-sizing: border-box;
  padding: 6px 10px;
  white-space: pre;
  line-height: 1.3;
  overflow: hidden;
  border-left: 1px solid #ffffff88;
}

.freshness-bar .segment:first-child { border-left: none; }

.freshness-bar .segment { filter: saturate(0.3); }
.freshness-bar .segment.active { filter: brightness(1.6) saturate(1); }

.freshness-bar .seg-prevalid { flex: 0 0 60px; background: #1a1a2e; color: var(--text-dim); }
.freshness-bar .seg-fresh    { background: #1a2a1a; color: #81c784; }
.freshness-bar .seg-valid    { background: #2a2210; color: #ffb74d; }
.freshness-bar .seg-stale    { flex: 0 0 60px; background: #2a1a1a; color: #e57373; }

.freshness-now {
  position: absolute;
  bottom: 0;
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 6px solid var(--text);
  transform: translateX(-6px);
  pointer-events: none;
}

/* Shared raw text */
.raw-text {
  font-family: var(--mono);
  font-size: 0.75rem;
  line-height: 1.4;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.75rem;
  margin-top: 0.5rem;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-dim);
  max-height: 300px;
  overflow-y: auto;
}

/* Expandable list items (auth certs) */
.item-list { margin-top: 0.75rem; }

.item-row {
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.item-row:hover { background: rgba(123, 104, 238, 0.05); }

.item-summary {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.5rem 0.25rem;
  font-size: 0.8rem;
  font-family: var(--mono);
  color: var(--text-dim);
}

.item-summary .chevron {
  font-size: 0.7rem;
  color: var(--text-muted);
  transition: transform 0.15s;
  flex-shrink: 0;
}
.item-row.open .chevron { transform: rotate(90deg); }

.item-summary .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-summary .meta { color: var(--text-muted); font-size: 0.75rem; white-space: nowrap; }

.item-detail { display: none; padding: 0 0.25rem 0.5rem; }
.item-row.open .item-detail { display: block; }

/* Virtual scroll browser */
.vlist-browser { margin-top: 0.75rem; }

#unified-search {
  width: 100%;
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  margin-bottom: 1rem;
}
#unified-search:focus { border-color: var(--accent); }
#unified-search::placeholder { color: var(--text-muted); }

.vlist-info {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 0.4rem;
  font-family: var(--mono);
}

.vlist-viewport {
  height: 400px;
  overflow-y: auto;
  position: relative;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
}

.vlist-sentinel { width: 1px; }

.vlist-item {
  position: absolute;
  left: 0;
  right: 0;
  padding: 0.4rem 0.75rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.vlist-item:hover { background: rgba(123, 104, 238, 0.05); }

.vlist-item .nickname {
  color: var(--text);
  font-weight: 600;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.vlist-item .ip { color: var(--text-dim); white-space: nowrap; }
.vlist-item .bw { color: var(--text-muted); white-space: nowrap; margin-left: auto; }

.vlist-item .mini-flags {
  display: flex;
  gap: 0.2rem;
  flex-shrink: 0;
}

.mini-flag {
  font-size: 0.6rem;
  padding: 0.05rem 0.3rem;
  border-radius: 3px;
  background: var(--border);
  color: var(--text-muted);
}
.mini-flag.exit { background: #3a1a1a; color: #e57373; }
.mini-flag.guard { background: #1a2a1a; color: #81c784; }

/* Expanded detail inside virtual list */
.vlist-expanded {
  position: absolute;
  left: 0;
  right: 0;
  background: var(--bg-card);
  border-bottom: 1px solid var(--accent);
  z-index: 1;
}
.vlist-expanded .raw-text { margin: 0; border: none; border-radius: 0; max-height: 250px; }


#results-section.search-active .result-summary { display: none; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <a href="/" style="color:inherit;text-decoration:none;"><h1>tor-js-gateway</h1></a>
      <p class="subtitle">Tor directory cache &mdash; fast bootstrap archive server</p>
    </div>
    <div style="display:flex;align-items:center;gap:1.25rem;font-size:0.875rem;">
      <a href="/connect" style="color:var(--text-dim);text-decoration:none;">Connect</a>
      <a href="/bootstrap" style="color:var(--text-dim);text-decoration:none;">Bootstrap</a>
      <a href="https://github.com/privacy-ethereum/tor-fast-bootstrap" class="github-link" title="View on GitHub">
        <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor">

        </svg>
      </a>
    </div>
  </div>
</header>

<main>
  <div class="action">
    <button id="bootstrap-btn">Bootstrap</button>
    <button id="download-zip-btn">ZIP Archive</button>
  </div>

  <section id="log-section" hidden>
    <h2>Progress</h2>
    <div id="log">
      <span class="log-header">Step</span>
      <span class="log-header">Total</span>
      <span class="log-header"></span>
      <span class="log-header">Message</span>
    </div>
  </section>

  <section id="results-section" hidden>
    <h2>Bootstrap Contents</h2>
    <input id="unified-search" class="vlist-search" placeholder="Search relays, microdescs, certs&#x2026;" />
    <div class="result-block" id="consensus-block"></div>
    <div class="result-block" id="authcerts-block"></div>
    <div class="result-block" id="microdescs-block"></div>
  </section>
</main>

<script type="module">
import { smartBootstrapDownload, parseBootstrapZip } from './torJsGateway.js';

const logEl = document.getElementById('log');
let t0 = 0;
let current = null; // { step, total, icon, msg }
let decompressRow = null;
const stamps = {};
let cachedZipBytes = null;

function elapsed() { return Math.round(performance.now() - t0); }

function fmt(n) {
  if (n >= 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
  return (n / 1024).toFixed(0) + ' KB';
}
let _fmtW = 0;
function fmtPair(loaded, total) {
  const a = fmt(loaded), b = fmt(total);
  _fmtW = Math.max(_fmtW, a.length, b.length);
  return a.padStart(_fmtW) + ' / ' + b.padStart(_fmtW);
}

function logStep(msg) {
  const step = document.createElement('span');
  step.className = 'log-step';
  const total = document.createElement('span');
  total.className = 'log-total';
  total.textContent = '';
  const icon = document.createElement('span');
  icon.className = 'log-icon spin';
  icon.textContent = '\u25E0';
  const msgEl = document.createElement('span');
  msgEl.className = 'log-msg';
  msgEl.textContent = msg;
  logEl.append(step, total, icon, msgEl);
  return { step, total, icon, msg: msgEl };
}

function completeStep(row, stepMs, msg) {
  row.step.textContent = stepMs + 'ms';
  row.total.textContent = elapsed() + 'ms';
  row.icon.className = 'log-icon done';
  row.icon.textContent = '\u2713';
  row.msg.textContent = msg;
  row.step.parentElement; // no wrapper, but mark cells
  [row.step, row.total, row.icon, row.msg].forEach(el => el.classList.add('log-row-done'));
}

function onEvent(ev) {
  switch (ev.type) {
    case 'fetch-start':
      _fmtW = 0;
      stamps.fetch = performance.now();
      current = logStep('Connecting\u2026');
      break;
    case 'fetch-progress': {
      if (!current._bar) {
        // First progress event — complete "Connecting" step, start download step with bar
        const ms = Math.round(performance.now() - stamps.fetch);
        completeStep(current, ms, 'Connected');
        stamps.download = performance.now();
        const prefix = ev.transparent ? 'Receiving:' : 'Downloading:';
        current = logStep(ev.transparent ? 'Receiving\u2026' : 'Downloading\u2026');
        current.msg.innerHTML = '';
        current._bar = document.createElement('div');
        current._bar.className = 'progress-bar';
        current._bar.innerHTML =
          `<span class="progress-prefix">${prefix}</span>` +
          '<div class="progress-track"><div class="progress-fill"></div></div>' +
          '<span class="progress-label">0 KB</span>';
        current.msg.appendChild(current._bar);
      }
      const fill = current._bar.querySelector('.progress-fill');
      const label = current._bar.querySelector('.progress-label');
      if (ev.total) {
        fill.style.width = ((ev.loaded / ev.total) * 100).toFixed(1) + '%';
        label.textContent = fmtPair(ev.loaded, ev.total);
      } else {
        label.textContent = fmt(ev.loaded);
      }
      break;
    }
    case 'fetch-done': {
      const ms = Math.round(performance.now() - stamps.download || stamps.fetch);
      completeStep(current, ms, `Downloaded ${fmt(ev.bytes)}`);
      break;
    }
    case 'decompress-start':
      stamps.decompress = performance.now();
      decompressRow = logStep('Decompressing brotli\u2026');
      decompressRow.msg.innerHTML = '';
      decompressRow._bar = document.createElement('div');
      decompressRow._bar.className = 'progress-bar';
      decompressRow._bar.innerHTML =
        '<span class="progress-prefix">Decompressing:</span>' +
        '<div class="progress-track"><div class="progress-fill"></div></div>' +
        '<span class="progress-label">0 KB</span>';
      decompressRow.msg.appendChild(decompressRow._bar);
      break;
    case 'decompress-progress': {
      if (!decompressRow?._bar) break;
      const fill = decompressRow._bar.querySelector('.progress-fill');
      const label = decompressRow._bar.querySelector('.progress-label');
      if (ev.total) {
        fill.style.width = ((ev.loaded / ev.total) * 100).toFixed(1) + '%';
        label.textContent = fmtPair(ev.loaded, ev.total);
      } else {
        label.textContent = fmt(ev.loaded);
}
      break;
    }
    case 'decompress-done':
      if (ev.method === 'transparent') {
        decompressRow = logStep('Decompressing brotli\u2026');
        completeStep(decompressRow, 0, `Decompressed to ${fmt(ev.bytes)} transparently`);
      } else {
        const ms = Math.round(performance.now() - stamps.decompress);
        completeStep(decompressRow, ms, `Decompressed to ${fmt(ev.bytes)}`);
      }
      stamps.parse = performance.now();
      current = logStep('Parsing archive\u2026');
      break;
    case 'parse-done': {
      const ms = Math.round(performance.now() - stamps.parse);
      completeStep(current, ms, `Parsed consensus, ${ev.microdescs.length.toLocaleString()} microdescs, ${ev.authcerts.length} auth certs`);
      break;
    }
    case 'done':
      break;
  }
}

// --- Parsing helpers ---

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getField(text, key) {
  const m = text.match(new RegExp('^' + key + ' (.+)$', 'm'));
  return m ? m[1] : null;
}

function parseConsensus(text) {
  const lines = text.split('\n');
  let i = 0;

  // Header: everything before first relay
  while (i < lines.length && !lines[i].startsWith('r ')) i++;
  const header = lines.slice(0, i).join('\n');

  // Relays: blocks starting with 'r '
  const relays = [];
  while (i < lines.length) {
    if (!lines[i].startsWith('r ')) {
      if (lines[i] === 'directory-footer') break;
      i++; continue;
    }
    const start = i;
    const rParts = lines[i].split(' ');
    const nickname = rParts[1] || '?';
    const ip = rParts[5] || '?';
    const port = rParts[6] || '0';
    i++;
    let flags = [], bandwidth = 0, mdHash = '', rawLines = [lines[start]];
    while (i < lines.length && !lines[i].startsWith('r ') && lines[i] !== 'directory-footer') {
      rawLines.push(lines[i]);
      if (lines[i].startsWith('s ')) flags = lines[i].slice(2).split(' ');
      if (lines[i].startsWith('w ')) {
        const bwm = lines[i].match(/Bandwidth=(\d+)/);
        if (bwm) bandwidth = parseInt(bwm[1], 10);
      }
      if (lines[i].startsWith('m ')) mdHash = lines[i].split(' ')[1] || '';
      i++;
    }
    relays.push({ nickname, ip, port, flags, bandwidth, mdHash, raw: rawLines.join('\n') });
  }

  // Footer: directory-footer onward
  const footerLines = lines.slice(i);
  const footerText = footerLines.join('\n');

  // Parse bandwidth-weights
  const bwWeights = getField(footerText, 'bandwidth-weights') || '';

  // Parse directory signatures
  const signatures = [];
  const sigBlocks = footerText.split(/(?=^directory-signature )/m);
  for (const block of sigBlocks) {
    if (!block.startsWith('directory-signature ')) continue;
    const parts = block.match(/^directory-signature\s+(\S+)\s+(\S+)\s+(\S+)/);
    const identity = parts ? parts[2] : '?';
    signatures.push({ identity, raw: block.trim() });
  }

  return { header, relays, bwWeights, signatures };
}

function parseMicrodescSummary(md) {
  const id = getField(md, 'id ed25519') || '';
  const ntor = getField(md, 'ntor-onion-key') || '';
  const pLine = md.match(/^p6? (.+)$/m);
  const policy = pLine ? pLine[1] : '';
  return { id, ntor, policy };
}

function parseAuthCert(cert) {
  return {
    fingerprint: getField(cert, 'fingerprint') || 'unknown',
    published: getField(cert, 'dir-key-published') || '?',
    expires: getField(cert, 'dir-key-expires') || '?',
  };
}

let _hashAll;
async function loadSha256() {
  if (_hashAll) return;
  function toBase64NoPad(bytes) {
    let binary = '';
    for (const b of bytes) binary += String.fromCharCode(b);
    return btoa(binary).replace(/=+$/, '');
  }
  if (crypto.subtle) {
    _hashAll = (texts) => Promise.all(texts.map(async (t) => {
      const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
      return toBase64NoPad(new Uint8Array(hash));
    }));
  } else {
    const mod = await import('https://cdn.jsdelivr.net/npm/@noble/hashes@1.7.0/sha256/+esm');
    const sha256 = mod.sha256;
    _hashAll = (texts) => Promise.resolve(texts.map(t =>
      toBase64NoPad(sha256(new TextEncoder().encode(t)))
    ));
  }
}

// --- Collapsible item row helper ---

function makeCollapsible(label, meta, rawText) {
  const row = document.createElement('div');
  row.className = 'item-row';
  const summary = document.createElement('div');
  summary.className = 'item-summary';
  summary.innerHTML =
    `<span class="chevron">\u25B6</span>` +
    `<span class="label">${esc(label)}</span>` +
    (meta ? `<span class="meta">${esc(meta)}</span>` : '');
  const detail = document.createElement('div');
  detail.className = 'item-detail';
  const pre = document.createElement('pre');
  pre.className = 'raw-text';
  pre.textContent = rawText;
  detail.appendChild(pre);
  row.appendChild(summary);
  row.appendChild(detail);
  row.addEventListener('click', () => row.classList.toggle('open'));
  return row;
}

// --- Freshness timeline bar ---

function createFreshnessBar(validAfterStr, freshUntilStr, validUntilStr) {
  const va = new Date(validAfterStr + 'Z').getTime();
  const fu = new Date(freshUntilStr + 'Z').getTime();
  const vu = new Date(validUntilStr + 'Z').getTime();
  const freshDur = fu - va;
  const validDur = vu - fu;

  const wrapper = document.createElement('div');
  wrapper.className = 'freshness-bar-wrap';

  const bar = document.createElement('div');
  bar.className = 'freshness-bar';

  const fmtTime = (d) => d.toISOString().slice(11, 16);

  const segPrevalid = document.createElement('div');
  segPrevalid.className = 'segment seg-prevalid';
  segPrevalid.textContent = '\nearly';

  const segFresh = document.createElement('div');
  segFresh.className = 'segment seg-fresh';
  segFresh.style.flex = freshDur;
  segFresh.textContent = fmtTime(new Date(va)) + '\nfresh';

  const segValid = document.createElement('div');
  segValid.className = 'segment seg-valid';
  segValid.style.flex = validDur;
  segValid.textContent = fmtTime(new Date(fu)) + '\nvalid';

  const segStale = document.createElement('div');
  segStale.className = 'segment seg-stale';
  segStale.textContent = fmtTime(new Date(vu)) + '\nstale';

  bar.append(segPrevalid, segFresh, segValid, segStale);

  const nowMarker = document.createElement('div');
  nowMarker.className = 'freshness-now';

  wrapper.append(bar, nowMarker);

  let timer;
  function update() {
    if (!wrapper.isConnected) { clearInterval(timer); return; }
    const now = Date.now();
    const barW = bar.offsetWidth;
    if (barW === 0) return;
    const preW = segPrevalid.offsetWidth;
    const freshW = segFresh.offsetWidth;
    const validW = segValid.offsetWidth;
    const staleW = segStale.offsetWidth;

    let px, activeSeg;
    if (now < va) {
      px = preW / 2;
      activeSeg = segPrevalid;
    } else if (now < fu) {
      px = preW + ((now - va) / freshDur) * freshW;
      activeSeg = segFresh;
    } else if (now < vu) {
      px = preW + freshW + ((now - fu) / validDur) * validW;
      activeSeg = segValid;
    } else {
      px = barW - staleW / 2;
      activeSeg = segStale;
    }
    nowMarker.style.left = px + 'px';
    for (const s of [segPrevalid, segFresh, segValid, segStale])
      s.classList.toggle('active', s === activeSeg);
  }

  update();
  timer = setInterval(update, 1000);
  new ResizeObserver(update).observe(bar);

  return wrapper;
}

// --- Virtual scroll list (no built-in search) ---

function createVirtualList(container, allItems, renderRow, searchFn, renderDetail) {
  const ROW_HEIGHT = 32;
  const OVERSCAN = 5;

  const info = document.createElement('div');
  info.className = 'vlist-info';
  container.appendChild(info);

  const viewport = document.createElement('div');
  viewport.className = 'vlist-viewport';
  container.appendChild(viewport);

  const sentinel = document.createElement('div');
  sentinel.className = 'vlist-sentinel';
  viewport.appendChild(sentinel);

  let filtered = allItems;
  let expandedIdx = -1;
  let renderedEls = [];
  let expandedDetail = null; // { idx, el } — kept stable across scroll renders

  function updateInfo() {
    if (filtered.length === allItems.length) {
      info.textContent = `${allItems.length.toLocaleString()} items`;
    } else {
      info.textContent = `${filtered.length.toLocaleString()} / ${allItems.length.toLocaleString()} items`;
    }
  }

  function render() {
    const scrollTop = viewport.scrollTop;
    const viewHeight = viewport.clientHeight;
    const totalHeight = filtered.length * ROW_HEIGHT;
    sentinel.style.height = totalHeight + 'px';

    const startIdx = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - OVERSCAN);
    const endIdx = Math.min(filtered.length, Math.ceil((scrollTop + viewHeight) / ROW_HEIGHT) + OVERSCAN);

    for (const el of renderedEls) el.remove();
    renderedEls = [];

    for (let i = startIdx; i < endIdx; i++) {
      const el = renderRow(filtered[i], i);
      el.style.top = (i * ROW_HEIGHT) + 'px';
      el.style.height = ROW_HEIGHT + 'px';
      el.addEventListener('click', () => {
        expandedIdx = expandedIdx === i ? -1 : i;
        render();
      });
      viewport.appendChild(el);
      renderedEls.push(el);
    }

    // Expanded detail — reuse DOM across scroll renders
    const shouldShowDetail = expandedIdx >= 0 && expandedIdx >= startIdx && expandedIdx < endIdx;
    if (shouldShowDetail) {
      if (!expandedDetail || expandedDetail.idx !== expandedIdx) {
        if (expandedDetail) expandedDetail.el.remove();
        const detail = document.createElement('div');
        detail.className = 'vlist-expanded';
        if (renderDetail) {
          detail.appendChild(renderDetail(filtered[expandedIdx]));
        } else {
          const pre = document.createElement('pre');
          pre.className = 'raw-text';
          pre.textContent = filtered[expandedIdx].raw || String(filtered[expandedIdx]);
          detail.appendChild(pre);
        }
        detail.addEventListener('click', (e) => e.stopPropagation());
        viewport.appendChild(detail);
        expandedDetail = { idx: expandedIdx, el: detail };
      }
      expandedDetail.el.style.top = ((expandedIdx + 1) * ROW_HEIGHT) + 'px';
    } else if (expandedDetail) {
      expandedDetail.el.remove();
      expandedDetail = null;
    }
  }

  function setFilter(q) {
    filtered = q ? allItems.filter(item => searchFn(item, q)) : allItems;
    expandedIdx = -1;
    if (expandedDetail) { expandedDetail.el.remove(); expandedDetail = null; }
    viewport.scrollTop = 0;
    updateInfo();
    render();
    return filtered.length;
  }

  viewport.addEventListener('scroll', render);
  new ResizeObserver(() => render()).observe(viewport);
  updateInfo();
  render();

  return { setFilter };
}

// --- Display sections ---

// Track all filterable sections for unified search
const filterGroups = []; // { blockEl, targets: [{ setFilter }] }

function displayConsensus(consensus, block, mdHashMap) {
  const validAfter = getField(consensus, 'valid-after');
  const freshUntil = getField(consensus, 'fresh-until');
  const validUntil = getField(consensus, 'valid-until');

  const parsed = parseConsensus(consensus);

  // Count flags
  const flagCounts = {};
  for (const r of parsed.relays) {
    for (const f of r.flags) {
      flagCounts[f] = (flagCounts[f] || 0) + 1;
    }
  }

  block.innerHTML = '<h3>Consensus</h3>';

  // Static summary (hidden during search)
  const summary = document.createElement('div');
  summary.className = 'result-summary';
  summary.innerHTML = `<dl>` +
    `<dt>Flavor</dt><dd>microdesc</dd>` +
    `<dt>Valid After</dt><dd>${esc(validAfter)}</dd>` +
    `<dt>Fresh Until</dt><dd>${esc(freshUntil)}</dd>` +
    `<dt>Valid Until</dt><dd>${esc(validUntil)}</dd>` +
    `<dt>Relays</dt><dd>${parsed.relays.length.toLocaleString()}</dd></dl>`;

  // Freshness timeline
  summary.appendChild(createFreshnessBar(validAfter, freshUntil, validUntil));

  // Flag bar
  const flagBar = document.createElement('div');
  flagBar.className = 'flag-bar';
  for (const f of ['Guard', 'Exit', 'HSDir', 'Stable', 'Fast', 'Running', 'V2Dir', 'Valid']) {
    if (!flagCounts[f]) continue;
    const badge = document.createElement('span');
    badge.className = 'flag-badge' +
      (f === 'Exit' ? ' exit' : f === 'Guard' ? ' guard' : f === 'HSDir' ? ' hsdir' : '');
    badge.textContent = `${f}: ${flagCounts[f].toLocaleString()}`;
    flagBar.appendChild(badge);
  }
  summary.appendChild(flagBar);

  // Collapsible consensus header
  summary.appendChild(makeCollapsible('Consensus Header', `${parsed.header.split('\n').length} lines`, parsed.header));

  // Bandwidth weights collapsible
  if (parsed.bwWeights) {
    summary.appendChild(makeCollapsible('Bandwidth Weights', '', parsed.bwWeights));
  }

  block.appendChild(summary);

  // Relay virtual list with microdesc join
  const relayItems = parsed.relays.map(r => {
    const md = mdHashMap.get(r.mdHash);
    return { ...r, microdesc: md || null };
  });

  const browser = document.createElement('div');
  browser.className = 'vlist-browser';
  block.appendChild(browser);

  const group = { blockEl: block, targets: [] };

  const relayVList = createVirtualList(browser, relayItems, (relay) => {
    const el = document.createElement('div');
    el.className = 'vlist-item';

    const nick = document.createElement('span');
    nick.className = 'nickname';
    nick.textContent = relay.nickname;

    const ip = document.createElement('span');
    ip.className = 'ip';
    ip.textContent = relay.ip + ':' + relay.port;

    const miniFlags = document.createElement('span');
    miniFlags.className = 'mini-flags';
    for (const f of relay.flags) {
      if (f === 'Exit' || f === 'Guard') {
        const mf = document.createElement('span');
        mf.className = 'mini-flag' + (f === 'Exit' ? ' exit' : ' guard');
        mf.textContent = f;
        miniFlags.appendChild(mf);
      }
    }

    const bw = document.createElement('span');
    bw.className = 'bw';
    bw.textContent = relay.bandwidth >= 1000 ? (relay.bandwidth / 1000).toFixed(0) + 'k' : relay.bandwidth + '';

    el.append(nick, ip, miniFlags, bw);
    return el;
  }, (relay, q) => {
    return relay.nickname.toLowerCase().includes(q)
      || relay.ip.includes(q)
      || relay.flags.some(f => f.toLowerCase().includes(q))
      || relay.raw.toLowerCase().includes(q)
      || (relay.mdHash && relay.mdHash.toLowerCase().includes(q))
      || (relay.microdesc && relay.microdesc.raw.toLowerCase().includes(q));
  }, (relay) => {
    const container = document.createElement('div');
    const pre = document.createElement('pre');
    pre.className = 'raw-text';
    pre.textContent = relay.raw;
    container.appendChild(pre);
    if (relay.microdesc) {
      container.appendChild(makeCollapsible(
        'Matched Microdesc',
        relay.microdesc.id || '',
        relay.microdesc.raw
      ));
    }
    return container;
  });

  group.targets.push(relayVList);

  // Directory signatures (searchable)
  if (parsed.signatures.length) {
    const sigHeader = document.createElement('h3');
    sigHeader.textContent = 'Directory Signatures';
    sigHeader.style.cssText = 'margin-top:1rem;font-size:0.85rem;color:var(--accent);';
    block.appendChild(sigHeader);

    const sigList = document.createElement('div');
    sigList.className = 'item-list';
    const sigRows = [];
    for (const sig of parsed.signatures) {
      const row = makeCollapsible(sig.identity, '', sig.raw);
      row._searchText = sig.raw.toLowerCase();
      sigList.appendChild(row);
      sigRows.push(row);
    }
    block.appendChild(sigList);

    group.targets.push({
      setFilter(q) {
        let count = 0;
        for (const row of sigRows) {
          const match = q ? row._searchText.includes(q) : true;
          row.hidden = !match;
          if (match) count++;
        }
        return count;
      }
    });
  }

  filterGroups.push(group);
}

function displayAuthCerts(authcerts, block) {
  block.innerHTML = '<h3>Authority Certificates</h3>';

  const summary = document.createElement('div');
  summary.className = 'result-summary';
  summary.innerHTML = `<dl><dt>Count</dt><dd>${authcerts.length}</dd></dl>`;
  block.appendChild(summary);

  const list = document.createElement('div');
  list.className = 'item-list';
  const certRows = [];

  for (const cert of authcerts) {
    const info = parseAuthCert(cert);
    const row = makeCollapsible(info.fingerprint, `expires ${info.expires}`, cert);
    row._searchText = cert.toLowerCase();
    list.appendChild(row);
    certRows.push(row);
  }
  block.appendChild(list);

  const group = { blockEl: block, targets: [] };
  group.targets.push({
    setFilter(q) {
      let count = 0;
      for (const row of certRows) {
        const match = q ? row._searchText.includes(q) : true;
        row.hidden = !match;
        if (match) count++;
      }
      return count;
    }
  });
  filterGroups.push(group);
}

function displayMicrodescs(microdescs, mdItems, block) {
  const mdSize = microdescs.reduce((s, m) => s + m.length, 0);
  block.innerHTML = '<h3>Microdescriptors</h3>';

  const summary = document.createElement('div');
  summary.className = 'result-summary';
  summary.innerHTML = `<dl>` +
    `<dt>Count</dt><dd>${microdescs.length.toLocaleString()}</dd>` +
    `<dt>Total Size</dt><dd>${fmt(mdSize)}</dd></dl>`;
  block.appendChild(summary);

  const browser = document.createElement('div');
  browser.className = 'vlist-browser';
  block.appendChild(browser);

  const group = { blockEl: block, targets: [] };

  const mdVList = createVirtualList(browser, mdItems, (item) => {
    const el = document.createElement('div');
    el.className = 'vlist-item';

    const id = document.createElement('span');
    id.className = 'nickname';
    id.textContent = item.id || item.ntor.slice(0, 20) + '\u2026';

    const policy = document.createElement('span');
    policy.className = 'ip';
    const policyText = item.policy.length > 40 ? item.policy.slice(0, 40) + '\u2026' : item.policy;
    policy.textContent = policyText;

    el.append(id, policy);
    return el;
  }, (item, q) => {
    return (item.hash && item.hash.toLowerCase().includes(q))
      || item.raw.toLowerCase().includes(q);
  });

  group.targets.push(mdVList);
  filterGroups.push(group);
}

async function displayContent({ consensus, microdescs, authcerts }) {
  filterGroups.length = 0;

  // Parse microdescs and compute SHA-256 hashes
  await loadSha256();
  const mdSummaries = microdescs.map(md => ({ ...parseMicrodescSummary(md), raw: md }));
  const hashes = await _hashAll(microdescs);
  const mdItems = mdSummaries.map((s, i) => ({ ...s, hash: hashes[i] }));

  // Build hash -> microdesc lookup
  const mdHashMap = new Map();
  for (const item of mdItems) {
    mdHashMap.set(item.hash, item);
  }

  displayConsensus(consensus, document.getElementById('consensus-block'), mdHashMap);
  displayAuthCerts(authcerts, document.getElementById('authcerts-block'));
  displayMicrodescs(microdescs, mdItems, document.getElementById('microdescs-block'));
  document.getElementById('results-section').hidden = false;

  // Wire up unified search with section visibility
  const resultsSection = document.getElementById('results-section');
  const searchInput = document.getElementById('unified-search');
  searchInput.value = '';
  let searchTimer;
  function applySearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const q = searchInput.value.toLowerCase().trim();
      resultsSection.classList.toggle('search-active', !!q);
      for (const group of filterGroups) {
        let totalMatches = 0;
        for (const target of group.targets) {
          totalMatches += target.setFilter(q);
        }
        group.blockEl.hidden = q ? totalMatches === 0 : false;
      }
    }, 150);
  }
  searchInput.oninput = applySearch;
  searchInput.onkeydown = (e) => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      applySearch();
      searchInput.blur();
    }
  };
}

async function runBootstrap() {
  const btn = document.getElementById('bootstrap-btn');
  const dlBtn = document.getElementById('download-zip-btn');
  btn.disabled = true;
  dlBtn.disabled = true;
  const logSection = document.getElementById('log-section');
  logSection.hidden = false;
  const oldBanner = logSection.querySelector('.error-banner');
  if (oldBanner) oldBanner.remove();
  document.getElementById('results-section').hidden = true;
  // Remove all cells after the 4 header spans
  while (logEl.children.length > 4) logEl.removeChild(logEl.lastChild);
  t0 = performance.now();

  const zipBytes = await smartBootstrapDownload('./bootstrap.zip.br', onEvent);
  cachedZipBytes = zipBytes;
  const result = parseBootstrapZip(zipBytes, onEvent);
  onEvent({ type: 'done' });
  const renderStart = performance.now();
  const renderRow = logStep('Analyzing\u2026');
  await displayContent(result);
  completeStep(renderRow, Math.round(performance.now() - renderStart), 'Analyzed');
  btn.disabled = false;
  dlBtn.disabled = false;
}

function triggerDownload(bytes) {
  const blob = new Blob([bytes], { type: 'application/zip' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bootstrap.zip';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function downloadZip() {
  const btn = document.getElementById('download-zip-btn');
  btn.disabled = true;
  try {
    if (!cachedZipBytes) {
      cachedZipBytes = await smartBootstrapDownload('./bootstrap.zip.br');
    }
    triggerDownload(cachedZipBytes);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('bootstrap-btn').addEventListener('click', () => {
  runBootstrap().catch(err => {
    document.getElementById('bootstrap-btn').disabled = false;
    document.getElementById('download-zip-btn').disabled = false;
    const logSection = document.getElementById('log-section');
    let banner = logSection.querySelector('.error-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.className = 'error-banner';
      logSection.appendChild(banner);
    }
    banner.innerHTML = '<strong>Bootstrap failed</strong>';
    banner.appendChild(document.createTextNode(String(err)));
  });
});

document.getElementById('download-zip-btn').addEventListener('click', () => {
  downloadZip().catch(err => alert('Download failed: ' + err));
});
